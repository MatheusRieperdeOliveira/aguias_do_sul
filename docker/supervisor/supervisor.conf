[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisord]
nodaemon=true
user=aguias

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php-fpm]
command=/usr/local/sbin/php-fpm -F
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/php-fpm.err.log
stdout_logfile=/var/log/supervisor/php-fpm.out.log

[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/app_aguiasdosul/artisan queue:work rabbitmq --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
user=aguias
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/app_aguiasdosul/storage/logs/worker.log
stopwaitsecs=3600

[program:vite]
process_name=%(program_name)s
command=npm run dev
directory=/var/www/app_aguiasdosul
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=aguias
redirect_stderr=true
stdout_logfile=/var/www/app_aguiasdosul/storage/logs/vite.log
stopwaitsecs=30
stopsignal=sigterm
