services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: aguias_app
    container_name: app_aguiasdosul
    ports:
      - "5173:5173"
    restart: unless-stopped
    working_dir: /var/www/app_aguiasdosul
    volumes:
      - .:/var/www/app_aguiasdosul
    environment:
      LOCAL_USER_ID: 1000
      LOCAL_GROUP_ID: 1000
    networks:
      - aguias_network
    depends_on:
      - database
      - redis

  nginx:
    image: nginx:alpine
    container_name: nginx_aguiasdosul
    restart: unless-stopped
    ports:
      - "8007:80"
    volumes:
      - .:/var/www/app_aguiasdosul
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - aguias_network
    depends_on:
      - app

  database:
    image: postgres:15
    container_name: aguias_do_sul_database
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - /var/www/app_aguiasdosul/database_aguiasdosul:/var/lib/postgresql/data
    networks:
      - aguias_network

  redis:
    image: redis:alpine
    container_name: aguias_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - aguias_network

  websocket:
    image: quay.io/soketi/soketi:1.4-16-debian
    container_name: aguias_websocket
    environment:
      TZ: America/Sao_Paulo
      SOKETI_DEBUG: "1"
      SOKETI_METRICS_SERVER_PORT: "9601"
      SOKETI_DEFAULT_APP_ID: "app-id"
      SOKETI_DEFAULT_APP_KEY: "app-key"
      SOKETI_DEFAULT_APP_SECRET: "app-secret"
      SOKETI_DEFAULT_APP_ENABLE_CLIENT_MESSAGES: "true"
      SOKETI_DEFAULT_APP_ENABLED: "true"
      SOKETI_DEFAULT_APP_MAX_CONNECTIONS: "100"
      SOKETI_DEFAULT_APP_MAX_BACKEND_EVENTS_PER_SEC: "100"
      SOKETI_DEFAULT_APP_MAX_CLIENT_EVENTS_PER_SEC: "60"
      SOKETI_DEFAULT_APP_MAX_READ_REQ_PER_SEC: "100"
      SOKETI_CORS_ORIGIN: "*"
      SOKETI_CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      SOKETI_CORS_HEADERS: "Origin,Content-Type,X-Auth-Token,X-Requested-With,Accept,Authorization,Cache-Control,X-File-Name"
      SOKETI_CORS_CREDENTIALS: "true"
      SOKETI_HOST: "0.0.0.0"
      SOKETI_PORT: "6001"
    ports:
      - "6001:6001"
      - "9601:9601"
    networks:
      - aguias_network

networks:
  aguias_network:
    driver: bridge

volumes:
  database_aguiasdosul:
    driver: local
