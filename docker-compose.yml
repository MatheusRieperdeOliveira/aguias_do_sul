services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: aguias
        uid: 1000
    image: aguias_app
    container_name: app_aguiasdosul
    ports:
      - "5173:5173"
    restart: unless-stopped
    working_dir: /var/www/app_aguiasdosul
    volumes:
      - .:/var/www/app_aguiasdosul
    networks:
      - aguias_network
    depends_on:
      - database
      - redis

  nginx:
    image: nginx:alpine
    container_name: nginx_aguiasdosul
    restart: unless-stopped
    ports:
      - "8007:80"
    volumes:
      - .:/var/www/app_aguiasdosul
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - aguias_network
    depends_on:
      - app

  database:
    image: postgres:15
    container_name: aguias_do_sul_database
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - database_aguiasdosul:/var/lib/postgresql/data
    networks:
      - aguias_network

  redis:
    image: redis:alpine
    container_name: aguias_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - aguias_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_aguiasdosul
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - aguias_network

networks:
  aguias_network:
    driver: bridge

volumes:
  database_aguiasdosul:
    driver: local
