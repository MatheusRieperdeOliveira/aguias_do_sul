services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: aguias_app
    container_name: app_aguiasdosul
    ports:
      - "5173:5173"
    restart: unless-stopped
    working_dir: /var/www/app_aguiasdosul
    volumes:
      - .:/var/www/app_aguiasdosul
    environment:
      LOCAL_USER_ID: 1000
      LOCAL_GROUP_ID: 1000
    networks:
      - aguias_network
    depends_on:
      - database
      - redis

  nginx:
    image: nginx:alpine
    container_name: nginx_aguiasdosul
    restart: unless-stopped
    ports:
      - "8007:80"
    volumes:
      - .:/var/www/app_aguiasdosul
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - aguias_network
    depends_on:
      - app

  database:
    image: postgres:15
    container_name: aguias_do_sul_database
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - /var/www/app_aguiasdosul/database_aguiasdosul:/var/lib/postgresql/data
    networks:
      - aguias_network

  redis:
    image: redis:alpine
    container_name: aguias_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - aguias_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_aguiasdosul
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - aguias_network

  prometheus:
    image: prom/prometheus:latest
    container_name: aguias_prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - /var/www/app_aguiasdosul/prometheus_data:/var/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: aguias_grafana
    ports:
        - "3000:3000"
    restart: unless-stopped
    volumes:
      - /var/www/app_aguiasdosul/grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

networks:
  aguias_network:
    driver: bridge

volumes:
  database_aguiasdosul:
    driver: local
  prometheus_data:
