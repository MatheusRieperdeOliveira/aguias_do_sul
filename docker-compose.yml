services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: aguias_app
    container_name: app_aguiasdosul
    ports:
      - "5174:5174"
    restart: unless-stopped
    working_dir: /var/www/app_aguiasdosul
    volumes:
      - .:/var/www/app_aguiasdosul
    environment:
      LOCAL_USER_ID: 1000
      LOCAL_GROUP_ID: 1000
    networks:
      - aguias_network
    depends_on:
      - database
      - redis

  nginx:
    image: nginx:alpine
    container_name: nginx_aguiasdosul
    restart: unless-stopped
    ports:
      - "8007:80"
    volumes:
      - .:/var/www/app_aguiasdosul
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - aguias_network
    depends_on:
      - app

  database:
    image: postgres:15
    container_name: aguias_do_sul_database
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5430:5432"
    volumes:
      - /var/www/app_aguiasdosul/database_aguiasdosul:/var/lib/postgresql/data
    networks:
      - aguias_network

  redis:
    image: redis:alpine
    container_name: aguias_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - aguias_network

  websocket:
    image: quay.io/soketi/soketi:1.4-16-debian
    container_name: aguias_websocket
    environment:
      - SOKETI_DEBUG=${PUSHER_DEBUG:-1}
      - SOKETI_DEFAULT_APP_ID=${PUSHER_APP_ID:-some-id}
      - SOKETI_DEFAULT_APP_KEY=${PUSHER_APP_KEY:-app-key}
      - SOKETI_DEFAULT_APP_SECRET=${PUSHER_APP_SECRET:-some-app-secret}
      - PUSHER_HOST=${PUSHER_HOST:-127.0.0.1}
      - PUSHER_PORT= ${PUSHER_PORT:-6001}
      - PUSHER_SCHEME=${PUSHER_SCHEME:-http}
      - METRICS_SERVER_PORT=${SOKETI_METRICS_SERVER_PORT:-9601}
      - DEFAULT_APP_ENABLE_CLIENT_MESSAGES=${DEFAULT_APP_ENABLE_CLIENT_MESSAGES:-false}
    ports:
      - "6002:6001"
      - "9602:9601"
    networks:
      - aguias_network

networks:
  aguias_network:
    driver: bridge

volumes:
  database_aguiasdosul:
    driver: local
